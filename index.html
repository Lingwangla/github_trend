<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GitHub 股票 Daily Trending Top 5</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f6f8fa;
      --card: #ffffff;
      --text: #24292f;
      --muted: #57606a;
      --border: #d0d7de;
      --link: #0969da;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0d1117;
        --card: #161b22;
        --text: #c9d1d9;
        --muted: #8b949e;
        --border: #30363d;
        --link: #58a6ff;
      }
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.5;
    }
    main {
      max-width: 1080px;
      margin: 0 auto;
      padding: 40px 20px;
    }
    header {
      margin-bottom: 24px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: clamp(28px, 5vw, 44px);
      line-height: 1.1;
    }
    .updated {
      color: var(--muted);
      margin: 0;
    }
    .list {
      display: grid;
      gap: 14px;
      padding: 0;
      margin: 0;
      list-style: none;
    }
    .repo {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px;
    }
    .repo-title {
      display: flex;
      gap: 10px;
      align-items: baseline;
      margin-bottom: 8px;
    }
    .rank {
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }
    a {
      color: var(--link);
      text-decoration: none;
      font-weight: 650;
    }
    a:hover {
      text-decoration: underline;
    }
    .description {
      margin: 0 0 12px;
      color: var(--text);
    }
    .section {
      margin-top: 14px;
    }
    .section h2 {
      margin: 0 0 6px;
      font-size: 15px;
    }
    .section p {
      margin: 0;
    }
    .section ul {
      margin: 0;
      padding-left: 20px;
    }
    .topics {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }
    .topic {
      border: 1px solid var(--border);
      border-radius: 999px;
      color: var(--muted);
      font-size: 13px;
      padding: 3px 9px;
    }
    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      color: var(--muted);
      font-size: 14px;
    }
    .star-chart {
      width: 100%;
      margin-top: 12px;
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #ffffff;
    }
    .star-chart img {
      display: block;
      width: 100%;
      height: auto;
    }
    .mermaid {
      margin-top: 12px;
      padding: 14px;
      overflow-x: auto;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--card);
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>GitHub 股票 Daily Trending Top 5</h1>
      <p class="updated">更新时间：2026-06-21T11:40:23Z</p>
      <p class="updated">筛选范围：仓库名称或描述包含 股票 相关关键词。关键词：股票，基金，炒股，量化交易。</p>
    </header>
    <ol class="list">
    </ol>
  </main>
  <script type="module">
    import mermaid from "https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs";
    mermaid.initialize({ startOnLoad: true, theme: "default" });
  </script>
</body>
</html>
